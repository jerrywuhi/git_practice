<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的個人網站</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: "Segoe UI", sans-serif;
        background: linear-gradient(135deg, #667eea, #764ba2);
        color: white;
    }

    /* 導覽列 */
    nav {
        display: flex;
        justify-content: space-between;
        padding: 20px 40px;
        position: sticky;
        top: 0;
        background: rgba(0,0,0,0.2);
        backdrop-filter: blur(10px);
    }

    nav h1 {
        font-size: 20px;
    }

    nav a {
        color: white;
        text-decoration: none;
        margin-left: 20px;
        transition: 0.3s;
    }

    nav a:hover {
        color: #ffd369;
    }

    /* 首頁 */
    .hero {
        text-align: center;
        padding: 100px 20px;
        animation: fadeIn 1s ease;
    }

    .hero h2 {
        font-size: 48px;
    }

    .hero p {
        margin-top: 10px;
        opacity: 0.8;
    }

    .btn {
        display: inline-block;
        margin-top: 20px;
        padding: 12px 25px;
        background: #ffd369;
        color: black;
        border-radius: 30px;
        text-decoration: none;
        font-weight: bold;
        transition: 0.3s;
    }

    .btn:hover {
        transform: scale(1.1);
    }

    /* 區塊 */
    section {
        padding: 60px 20px;
        max-width: 1000px;
        margin: auto;
    }

    h3 {
        margin-bottom: 20px;
        font-size: 28px;
    }

    /* 卡片 */
    .cards {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 20px;
    }

    .card {
        background: rgba(255,255,255,0.1);
        padding: 20px;
        border-radius: 15px;
        backdrop-filter: blur(10px);
        transition: 0.3s;
    }

    .card:hover {
        transform: translateY(-10px);
    }

    /* footer */
    footer {
        text-align: center;
        padding: 20px;
        opacity: 0.7;
    }

    /* 動畫 */
    @keyframes fadeIn {
        from {opacity: 0; transform: translateY(20px);}
        to {opacity: 1; transform: translateY(0);}
    }

    /* 手機優化 */
    @media(max-width:600px){
        .hero h2 {
            font-size: 32px;
        }
    }
</style>
</head>

<body>

<!-- 導覽列 -->
<nav>
    <h1>My Portfolio</h1>
    <div>
        <a href="#about">關於我</a>
        <a href="#skills">技能</a>
        <a href="#contact">聯絡</a>
    </div>
</nav>

<!-- 首頁 -->
<div class="hero">
    <h2>你好，我是你的名字</h2>
    <p>前端開發者 / 網頁設計學習者</p>
    <a href="#contact" class="btn">聯絡我</a>
</div>

<!-- 關於我 -->
<section id="about">
    <h3>關於我</h3>
    <div class="card">
        <p>
            我專注於網頁前端開發，喜歡打造具有美感與互動性的網站。
            目前持續精進 HTML / CSS / JavaScript。
        </p>
    </div>
</section>

<!-- 技能 -->
<section id="skills">
    <h3>技能</h3>
    <div class="cards">
        <div class="card">HTML</div>
        <div class="card">CSS</div>
        <div class="card">JavaScript</div>
        <div class="card">UI/UX 設計</div>
    </div>
</section>

<!-- 聯絡 -->
<section id="contact">
    <h3>聯絡我</h3>
    <div class="card">
        <p>Email: your@email.com</p>
        <p>Instagram: your_ig</p>
    </div>
</section>

<footer>
    © 2026 你的名字
</footer>

</body>
</html>
